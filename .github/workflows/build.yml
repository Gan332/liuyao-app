name: 构建 APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 版本号
        required: false
        default: '1.0.0'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ---- 前端构建 (Vite) ----
      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 安装依赖 (root workspace)
        run: npm ci

      - name: 构建前端 (Vite)
        working-directory: packages/web
        run: npx vite build

      - name: 同步构建产物到 Android assets
        run: |
          # Vite outDir -> ../../dist from packages/web = root dist/
          cp dist/index.html liuyao.html
          rm -rf assets
          cp -r dist/assets .
          mkdir -p liuyao-app/app/src/main/assets
          cp dist/index.html liuyao-app/app/src/main/assets/index.html
          rm -rf liuyao-app/app/src/main/assets/assets
          mkdir -p liuyao-app/app/src/main/assets/assets
          cp -r dist/assets/* liuyao-app/app/src/main/assets/assets/
          echo "=== Assets synced ==="
          echo "liuyao.html: $(wc -c < liuyao.html) bytes"
          ls -la liuyao-app/app/src/main/assets/assets/

      # ---- Android 构建 ----
      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: 配置 Android SDK
        run: |
          SDK=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV
          # Accept licenses
          yes | "$SDK/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
          # Install required components
          "$SDK/cmdline-tools/latest/bin/sdkmanager" "platforms;android-34" "build-tools;34.0.0" 2>&1
          echo "SDK path: $SDK"
          ls -d "$SDK/platforms/"* 2>/dev/null || echo "NO PLATFORMS"
          ls -d "$SDK/build-tools/"* 2>/dev/null || echo "NO BUILD-TOOLS"

      - name: 可选 - 更新版本号
        if: github.event_name == 'workflow_dispatch'
        run: |
          V="${{ github.event.inputs.version }}"
          sed -i "s/versionName = \".*\"/versionName = \"$V\"/" liuyao-app/app/build.gradle.kts

      - name: 构建 Debug APK
        working-directory: liuyao-app
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          set -o pipefail
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "JAVA_HOME=$JAVA_HOME"
          ls -la "$ANDROID_HOME/platforms/"
          ls -la "$ANDROID_HOME/build-tools/"
          chmod +x gradlew
          ./gradlew assembleDebug --info --no-daemon 2>&1 | tee /tmp/build.log; E=$?
          echo "=== GRADLE EXIT: $E ==="
          echo "=== LAST 100 LINES ==="
          tail -100 /tmp/build.log
          exit $E

      - name: 上传构建日志
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 7

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: liuyao-apk-v${{ github.event.inputs.version || '1.0.0' }}
          path: liuyao-app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: 显示构建信息
        run: |
          APK=$(find liuyao-app/app/build/outputs -name "*.apk" 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            echo "APK 路径: $APK"
            echo "大小: $(du -h "$APK" | cut -f1)"
            echo "MD5: $(md5sum "$APK" | cut -d' ' -f1)"
          else
            echo "未找到 APK 文件"
          fi
