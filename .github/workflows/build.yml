name: 构建 APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 版本号
        required: false
        default: '1.0.0'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: 配置 Android SDK
        run: |
          SDK_MANAGER=$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager
          if [ -f "$SDK_MANAGER" ]; then
            yes | $SDK_MANAGER --licenses > /dev/null 2>&1 || true
            $SDK_MANAGER "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1 || true
          fi
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "SDK ready"

      - name: 复制应用到 assets
        run: |
          mkdir -p liuyao-app/app/src/main/assets
          cp liuyao.html liuyao-app/app/src/main/assets/index.html
          echo "index.html copied ($(wc -c < liuyao-app/app/src/main/assets/index.html) bytes)"

      - name: 可选 - 更新版本号
        if: github.event_name == 'workflow_dispatch'
        run: |
          V="${{ github.event.inputs.version }}"
          sed -i "s/versionName = \".*\"/versionName = \"$V\"/" liuyao-app/app/build.gradle.kts
          echo "versionName -> $V"

      - name: 生成 Gradle Wrapper
        run: cd liuyao-app && gradle wrapper --gradle-version 8.5

      - name: 构建 Debug APK
        run: |
          cd liuyao-app
          chmod +x gradlew
          ./gradlew assembleDebug
          echo "=== APK 构建完成 ==="

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: liuyao-apk-v${{ github.event.inputs.version || '1.0.0' }}
          path: liuyao-app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: 显示构建信息
        run: |
          APK=$(find liuyao-app/app/build/outputs -name "*.apk" 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            echo "APK 路径: $APK"
            echo "大小: $(du -h "$APK" | cut -f1)"
            echo "MD5: $(md5sum "$APK" | cut -d' ' -f1)"
          else
            echo "未找到 APK 文件"
          fi
