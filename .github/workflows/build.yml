name: 构建 APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 版本号
        required: false
        default: '1.0.0'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ---- 前端构建 (Vite) ----
      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 构建前端 (Vite)
        run: npm run build:web

      # ---- Android 构建 ----
      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 可选 - 更新版本号
        if: github.event_name == 'workflow_dispatch'
        run: |
          V="${{ github.event.inputs.version }}"
          sed -i "s/versionName = \".*\"/versionName = \"$V\"/" liuyao-app/app/build.gradle.kts
          echo "versionName -> $V"

      - name: 构建 Debug APK
        run: |
          cd liuyao-app
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: liuyao-apk-v${{ github.event.inputs.version || '1.0.0' }}
          path: liuyao-app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: 显示构建信息
        run: |
          APK=$(find liuyao-app/app/build/outputs -name "*.apk" 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            echo "APK 路径: $APK"
            echo "大小: $(du -h "$APK" | cut -f1)"
            echo "MD5: $(md5sum "$APK" | cut -d' ' -f1)"
          else
            echo "未找到 APK 文件"
          fi
