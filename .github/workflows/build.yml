name: 构建 APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 版本号
        required: false
        default: '1.0.0'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ---- 前端构建 (Vite) ----
      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 安装依赖 (root workspace)
        run: npm ci

      - name: 构建前端 (Vite)
        working-directory: packages/web
        run: npx vite build

      - name: 同步构建产物到 Android assets
        run: |
          # Vite outDir -> ../../dist from packages/web = root dist/
          cp dist/index.html liuyao.html
          rm -rf assets
          cp -r dist/assets .
          mkdir -p liuyao-app/app/src/main/assets
          cp dist/index.html liuyao-app/app/src/main/assets/index.html
          rm -rf liuyao-app/app/src/main/assets/assets
          mkdir -p liuyao-app/app/src/main/assets/assets
          cp -r dist/assets/* liuyao-app/app/src/main/assets/assets/
          echo "=== Assets synced ==="
          echo "liuyao.html: $(wc -c < liuyao.html) bytes"
          ls -la liuyao-app/app/src/main/assets/assets/

      # ---- Android 构建 ----
      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 SDK 组件 (platform-34 + build-tools)
        run: |
          yes | "$ANDROID_HOME"/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          "$ANDROID_HOME"/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1 || true
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -d "$ANDROID_HOME"/platforms/android-34 2>/dev/null && echo "platform-34 OK" || echo "platform-34 MISSING"

      - name: 可选 - 更新版本号
        if: github.event_name == 'workflow_dispatch'
        run: |
          V="${{ github.event.inputs.version }}"
          sed -i "s/versionName = \".*\"/versionName = \"$V\"/" liuyao-app/app/build.gradle.kts

      - name: 构建 Debug APK
        working-directory: liuyao-app
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: liuyao-apk-v${{ github.event.inputs.version || '1.0.0' }}
          path: liuyao-app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: 显示构建信息
        run: |
          APK=$(find liuyao-app/app/build/outputs -name "*.apk" 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            echo "APK 路径: $APK"
            echo "大小: $(du -h "$APK" | cut -f1)"
            echo "MD5: $(md5sum "$APK" | cut -d' ' -f1)"
          else
            echo "未找到 APK 文件"
          fi
